application:
  name: Linux AI Assistant
  version: 0.1.0

runtime:
  python_min_version: "3.12"

directories:
  logs: assistant/logs
  cache: assistant/cache
  memory: assistant/memory
  config: assistant/config
  plugins: assistant/plugins
  tests: tests

logging:
  level: INFO
  file_name: assistant.log
  max_bytes: 1048576
  backup_count: 3
  console: false

dependencies:
  packages:
    - yaml
    - pydantic
    - typer
    - rich

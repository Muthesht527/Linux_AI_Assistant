application:
  name: Linux AI Assistant
  version: 1.0.0

runtime:
  python_min_version: "3.12"

directories:
  logs: assistant/logs
  cache: assistant/cache
  memory: assistant/memory
  config: assistant/config
  plugins: assistant/plugins
  tests: tests

logging:
  level: INFO
  file_name: assistant.log
  max_bytes: 1048576
  backup_count: 3
  console: false

dependencies:
  packages:
    - yaml
    - pydantic
    - typer
    - rich

conversation:
  base_url: http://localhost:11434
  default_model: qwen3
  system_prompt: "You are Linux AI Assistant, a helpful local assistant running completely on this machine."
  temperature: 0.7
  top_p: 0.9
  context_size: 4096
  max_history: 20
  history_enabled: true
  streaming_enabled: true
  request_timeout: 60

filesystem:
  indexed_paths: []
  ignored_folders:
    - .git
    - .venv
    - __pycache__
    - node_modules
    - .cache
    - Trash
  ignored_extensions: []
  maximum_file_size: 10485760
  cache_size: 256
  index_location: assistant/cache/filesystem_index.sqlite3
  disabled_locations: []
  include_root: true
  include_home: true
  include_mnt: true
  include_media: true

terminal:
  allowed_commands:
    - pwd
    - ls
    - lsblk
    - whoami
    - hostname
    - uname
    - date
    - free
    - df
    - du
    - tree
    - find
    - grep
    - cat
    - head
    - tail
    - wc
    - echo
    - which
    - whereis
    - file
    - stat
    - id
    - uptime
    - env
    - printenv
  blocked_commands:
    - sudo
    - su
    - rm
    - dd
    - mkfs
    - fdisk
    - shutdown
    - reboot
    - poweroff
    - halt
    - killall
    - chmod
    - chown
    - systemctl
    - journalctl
    - apt
    - snap
    - flatpak
    - mount
    - umount
    - curl
    - wget
    - ssh
  default_timeout: 5
  max_timeout: 15
  max_output_bytes: 20000
  history_limit: 100
  default_working_directory: .

diagnostics:
  max_processes: 10
  journal_lines: 100
  timeout: 5
  ignored_services: []
  ignored_devices: []

project:
  ignored_folders:
    - .git
    - .venv
    - __pycache__
    - node_modules
    - .cache
    - .pytest_cache
    - .ruff_cache
    - dist
    - build
  ignored_languages: []
  maximum_repository_size: 524288000
  maximum_file_size: 1048576
  maximum_files_analyzed: 500
  git_history_depth: 10

memory:
  database_path: assistant/memory/assistant_memory.sqlite
  max_recent_items: 25
  max_conversation_items: 50
  sensitive_keys:
    - password
    - token
    - secret
    - key
    - credential

cache:
  max_entries: 256
  ttl_seconds: 300

plugins:
  locations:
    - assistant/plugins
  enabled_plugins: []
  disabled_plugins: []

ui:
  theme: default
  history_length: 100

statistics:
  retention_days: 30
